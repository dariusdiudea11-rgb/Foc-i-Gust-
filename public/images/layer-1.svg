<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!--
    IE TRADIȚIONALĂ OAȘ — Pattern SVG
    Generată matematic din motife tradiționale de broderie românească.
    Culorile brandului: cremă #faf3e8 · roșu #c41e3a · navy #1a1520
    Tile 100×100px · seamless · optimizat pentru parallax hero
  -->
  <defs>

    <!-- ══ TILE PRINCIPAL 100×100 ══════════════════════════════════════════ -->
    <pattern id="p" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">

      <!-- Fundal cremă -->
      <rect width="100" height="100" fill="#faf3e8"/>

      <!-- Stea 8 colțuri (roșu) · R=18, r=7.2 · centru (50,50)
           Vârfuri exterioare la 0°,45°,90°,135°,180°,225°,270°,315° (din vârf, orar)
           Vârfuri interioare la 22.5°,67.5°,112.5°,157.5°,202.5°,247.5°,292.5°,337.5° -->
      <polygon
        points="50,32 52.8,43.3 62.7,37.3 56.7,47.2 68,50 56.7,52.8 62.7,62.7 52.8,56.7 50,68 47.2,56.7 37.3,62.7 43.3,52.8 32,50 43.3,47.2 37.3,37.3 47.2,43.3"
        fill="#c41e3a"/>

      <!-- Diamant navy central (R=4.5) -->
      <polygon points="50,45.5 54.5,50 50,54.5 45.5,50" fill="#1a1520"/>

      <!-- Punct roșu minim în centru -->
      <polygon points="50,48 52,50 50,52 48,50" fill="#c41e3a"/>

      <!-- 4 accente diagonale navy (R=3) la 45° față de centru, dist=35 -->
      <polygon points="75,22 78,25 75,28 72,25" fill="#1a1520"/>
      <polygon points="75,72 78,75 75,78 72,75" fill="#1a1520"/>
      <polygon points="25,72 28,75 25,78 22,75" fill="#1a1520"/>
      <polygon points="25,22 28,25 25,28 22,25" fill="#1a1520"/>

      <!-- ── Elemente de îmbinare seamless ──────────────────────────────── -->

      <!-- Diamante navy (R=7) la toate 4 colțurile tile-ului
           Când 4 tile-uri se întâlnesc, sferturile lor formează diamante complete -->
      <polygon points="0,-7 7,0 0,7 -7,0"          fill="#1a1520"/>
      <polygon points="100,-7 107,0 100,7 93,0"     fill="#1a1520"/>
      <polygon points="0,93 7,100 0,107 -7,100"     fill="#1a1520"/>
      <polygon points="100,93 107,100 100,107 93,100" fill="#1a1520"/>

      <!-- Diamante roșii (R=3) la mijlocul fiecărui edge -->
      <polygon points="50,-3 53,0 50,3 47,0"    fill="#c41e3a"/>
      <polygon points="100,47 103,50 100,53 97,50" fill="#c41e3a"/>
      <polygon points="50,97 53,100 50,103 47,100" fill="#c41e3a"/>
      <polygon points="-3,50 0,47 3,50 0,53"    fill="#c41e3a"/>

    </pattern>

    <!-- ══ TILE BORDURĂ 20×20 (navy + diamant roșu) ═════════════════════ -->
    <pattern id="b" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#1a1520"/>
      <!-- Diamant roșu exterior -->
      <polygon points="10,2 18,10 10,18 2,10" fill="#c41e3a"/>
      <!-- Inel cremă interior -->
      <polygon points="10,5 15,10 10,15 5,10"  fill="#faf3e8" opacity="0.3"/>
      <!-- Punct navy center -->
      <polygon points="10,8 12,10 10,12 8,10"  fill="#1a1520"/>
    </pattern>

  </defs>

  <!-- ══ FUNDAL CU PATTERN IE ══════════════════════════════════════════════ -->
  <rect width="600" height="600" fill="url(#p)"/>

  <!-- ══ BORDURĂ NAVY CU DIAMANTE ROȘII (22px) ═════════════════════════════ -->
  <rect x="0"   y="0"   width="600" height="22" fill="url(#b)"/>
  <rect x="0"   y="578" width="600" height="22" fill="url(#b)"/>
  <rect x="0"   y="22"  width="22"  height="556" fill="url(#b)"/>
  <rect x="578" y="22"  width="22"  height="556" fill="url(#b)"/>

  <!-- Linie de accent cremă interioară (1.5px la 24px de margine) -->
  <rect x="24"   y="24"   width="552" height="1.5" fill="#faf3e8" opacity="0.4"/>
  <rect x="24"   y="574.5" width="552" height="1.5" fill="#faf3e8" opacity="0.4"/>
  <rect x="24"   y="25.5"  width="1.5" height="549" fill="#faf3e8" opacity="0.4"/>
  <rect x="574.5" y="25.5"  width="1.5" height="549" fill="#faf3e8" opacity="0.4"/>

  <!-- ══ FLORI DE COLȚ (stele 8 colțuri roșu+navy, R=28/R=20) ════════════ -->

  <!-- Colț stânga-sus (70,70) -->
  <g transform="translate(70,70)">
    <polygon points="0,-28 4.2,-10.2 19.8,-19.8 10.2,-4.2 28,0 10.2,4.2 19.8,19.8 4.2,10.2 0,28 -4.2,10.2 -19.8,19.8 -10.2,4.2 -28,0 -10.2,-4.2 -19.8,-19.8 -4.2,-10.2" fill="#c41e3a"/>
    <polygon points="8.4,-20.3 6.2,-6.2 20.3,-8.4 8.8,0 20.3,8.4 6.2,6.2 8.4,20.3 0,8.8 -8.4,20.3 -6.2,6.2 -20.3,8.4 -8.8,0 -20.3,-8.4 -6.2,-6.2 -8.4,-20.3 0,-8.8" fill="#1a1520"/>
    <polygon points="0,-10 10,0 0,10 -10,0" fill="#c41e3a"/>
    <polygon points="0,-4 4,0 0,4 -4,0"   fill="#1a1520"/>
  </g>

  <!-- Colț dreapta-sus (530,70) -->
  <g transform="translate(530,70)">
    <polygon points="0,-28 4.2,-10.2 19.8,-19.8 10.2,-4.2 28,0 10.2,4.2 19.8,19.8 4.2,10.2 0,28 -4.2,10.2 -19.8,19.8 -10.2,4.2 -28,0 -10.2,-4.2 -19.8,-19.8 -4.2,-10.2" fill="#c41e3a"/>
    <polygon points="8.4,-20.3 6.2,-6.2 20.3,-8.4 8.8,0 20.3,8.4 6.2,6.2 8.4,20.3 0,8.8 -8.4,20.3 -6.2,6.2 -20.3,8.4 -8.8,0 -20.3,-8.4 -6.2,-6.2 -8.4,-20.3 0,-8.8" fill="#1a1520"/>
    <polygon points="0,-10 10,0 0,10 -10,0" fill="#c41e3a"/>
    <polygon points="0,-4 4,0 0,4 -4,0"   fill="#1a1520"/>
  </g>

  <!-- Colț stânga-jos (70,530) -->
  <g transform="translate(70,530)">
    <polygon points="0,-28 4.2,-10.2 19.8,-19.8 10.2,-4.2 28,0 10.2,4.2 19.8,19.8 4.2,10.2 0,28 -4.2,10.2 -19.8,19.8 -10.2,4.2 -28,0 -10.2,-4.2 -19.8,-19.8 -4.2,-10.2" fill="#c41e3a"/>
    <polygon points="8.4,-20.3 6.2,-6.2 20.3,-8.4 8.8,0 20.3,8.4 6.2,6.2 8.4,20.3 0,8.8 -8.4,20.3 -6.2,6.2 -20.3,8.4 -8.8,0 -20.3,-8.4 -6.2,-6.2 -8.4,-20.3 0,-8.8" fill="#1a1520"/>
    <polygon points="0,-10 10,0 0,10 -10,0" fill="#c41e3a"/>
    <polygon points="0,-4 4,0 0,4 -4,0"   fill="#1a1520"/>
  </g>

  <!-- Colț dreapta-jos (530,530) -->
  <g transform="translate(530,530)">
    <polygon points="0,-28 4.2,-10.2 19.8,-19.8 10.2,-4.2 28,0 10.2,4.2 19.8,19.8 4.2,10.2 0,28 -4.2,10.2 -19.8,19.8 -10.2,4.2 -28,0 -10.2,-4.2 -19.8,-19.8 -4.2,-10.2" fill="#c41e3a"/>
    <polygon points="8.4,-20.3 6.2,-6.2 20.3,-8.4 8.8,0 20.3,8.4 6.2,6.2 8.4,20.3 0,8.8 -8.4,20.3 -6.2,6.2 -20.3,8.4 -8.8,0 -20.3,-8.4 -6.2,-6.2 -8.4,-20.3 0,-8.8" fill="#1a1520"/>
    <polygon points="0,-10 10,0 0,10 -10,0" fill="#c41e3a"/>
    <polygon points="0,-4 4,0 0,4 -4,0"   fill="#1a1520"/>
  </g>

  <!-- ══ MEDALION CENTRAL (300,300) ═══════════════════════════════════════ -->
  <g transform="translate(300,300)">

    <!-- Stea exterioară (roșu, R=38, r=15.2) -->
    <polygon
      points="0,-38 5.8,-14 26.9,-26.9 14,-5.8 38,0 14,5.8 26.9,26.9 5.8,14 0,38 -5.8,14 -26.9,26.9 -14,5.8 -38,0 -14,-5.8 -26.9,-26.9 -5.8,-14"
      fill="#c41e3a"/>

    <!-- Stea interioară (navy, R=28, r=11.2, rotită 22.5°) -->
    <polygon
      points="10.7,-25.9 7.9,-7.9 25.9,-10.7 11.2,0 25.9,10.7 7.9,7.9 10.7,25.9 0,11.2 -10.7,25.9 -7.9,7.9 -25.9,10.7 -11.2,0 -25.9,-10.7 -7.9,-7.9 -10.7,-25.9 0,-11.2"
      fill="#1a1520"/>

    <!-- Diamant central roșu (R=14) -->
    <polygon points="0,-14 14,0 0,14 -14,0" fill="#c41e3a"/>
    <!-- Diamant navy interior (R=7) -->
    <polygon points="0,-7 7,0 0,7 -7,0"     fill="#1a1520"/>
    <!-- Punct roșu minim -->
    <polygon points="0,-3 3,0 0,3 -3,0"     fill="#c41e3a"/>

    <!-- ── RAMURI CARDINALE (N, S, E, V) — motive tip ramură ────────────── -->
    <!-- Fiecare ramură: 4 diamante roșii pe axa principală + diamante mici flancare navy -->

    <!-- NORD -->
    <polygon points="0,-46 4,-50 0,-54 -4,-50"   fill="#c41e3a"/>
    <polygon points="0,-58 4,-62 0,-66 -4,-62"   fill="#c41e3a"/>
    <polygon points="0,-70 4,-74 0,-78 -4,-74"   fill="#c41e3a"/>
    <polygon points="0,-82 3,-86 0,-90 -3,-86"   fill="#c41e3a"/>
    <polygon points="-11,-50 -8,-53 -11,-56 -14,-53" fill="#1a1520"/>
    <polygon points="11,-50 14,-53 11,-56 8,-53"     fill="#1a1520"/>
    <polygon points="-15,-62 -12,-66 -15,-70 -18,-66" fill="#c41e3a"/>
    <polygon points="15,-62 18,-66 15,-70 12,-66"    fill="#c41e3a"/>
    <polygon points="-21,-62 -18,-65 -21,-68 -24,-65" fill="#1a1520"/>
    <polygon points="21,-62 24,-65 21,-68 18,-65"    fill="#1a1520"/>
    <polygon points="-10,-74 -7,-77 -10,-80 -13,-77"  fill="#1a1520"/>
    <polygon points="10,-74 13,-77 10,-80 7,-77"     fill="#1a1520"/>
    <polygon points="-4,-90 0,-95 4,-90 0,-87"       fill="#1a1520"/>

    <!-- SUD (simetric N) -->
    <polygon points="0,46 4,50 0,54 -4,50"   fill="#c41e3a"/>
    <polygon points="0,58 4,62 0,66 -4,62"   fill="#c41e3a"/>
    <polygon points="0,70 4,74 0,78 -4,74"   fill="#c41e3a"/>
    <polygon points="0,82 3,86 0,90 -3,86"   fill="#c41e3a"/>
    <polygon points="-11,50 -8,53 -11,56 -14,53"  fill="#1a1520"/>
    <polygon points="11,50 14,53 11,56 8,53"      fill="#1a1520"/>
    <polygon points="-15,62 -12,66 -15,70 -18,66" fill="#c41e3a"/>
    <polygon points="15,62 18,66 15,70 12,66"     fill="#c41e3a"/>
    <polygon points="-21,62 -18,65 -21,68 -24,65" fill="#1a1520"/>
    <polygon points="21,62 24,65 21,68 18,65"     fill="#1a1520"/>
    <polygon points="-10,74 -7,77 -10,80 -13,77"  fill="#1a1520"/>
    <polygon points="10,74 13,77 10,80 7,77"      fill="#1a1520"/>
    <polygon points="-4,90 0,95 4,90 0,87"        fill="#1a1520"/>

    <!-- EST (rotit 90° față de N) -->
    <polygon points="46,0 50,4 54,0 50,-4"   fill="#c41e3a"/>
    <polygon points="58,0 62,4 66,0 62,-4"   fill="#c41e3a"/>
    <polygon points="70,0 74,4 78,0 74,-4"   fill="#c41e3a"/>
    <polygon points="82,0 86,3 90,0 86,-3"   fill="#c41e3a"/>
    <polygon points="50,-11 53,-8 56,-11 53,-14" fill="#1a1520"/>
    <polygon points="50,11 53,14 56,11 53,8"    fill="#1a1520"/>
    <polygon points="62,-15 66,-12 70,-15 66,-18" fill="#c41e3a"/>
    <polygon points="62,15 66,18 70,15 66,12"    fill="#c41e3a"/>
    <polygon points="62,-21 65,-18 68,-21 65,-24" fill="#1a1520"/>
    <polygon points="62,21 65,24 68,21 65,18"    fill="#1a1520"/>
    <polygon points="74,-10 77,-7 80,-10 77,-13"  fill="#1a1520"/>
    <polygon points="74,10 77,13 80,10 77,7"     fill="#1a1520"/>
    <polygon points="90,-4 95,0 90,4 87,0"       fill="#1a1520"/>

    <!-- VEST (simetric E) -->
    <polygon points="-46,0 -50,4 -54,0 -50,-4"  fill="#c41e3a"/>
    <polygon points="-58,0 -62,4 -66,0 -62,-4"  fill="#c41e3a"/>
    <polygon points="-70,0 -74,4 -78,0 -74,-4"  fill="#c41e3a"/>
    <polygon points="-82,0 -86,3 -90,0 -86,-3"  fill="#c41e3a"/>
    <polygon points="-50,-11 -53,-8 -56,-11 -53,-14" fill="#1a1520"/>
    <polygon points="-50,11 -53,14 -56,11 -53,8"    fill="#1a1520"/>
    <polygon points="-62,-15 -66,-12 -70,-15 -66,-18" fill="#c41e3a"/>
    <polygon points="-62,15 -66,18 -70,15 -66,12"    fill="#c41e3a"/>
    <polygon points="-62,-21 -65,-18 -68,-21 -65,-24" fill="#1a1520"/>
    <polygon points="-62,21 -65,24 -68,21 -65,18"    fill="#1a1520"/>
    <polygon points="-74,-10 -77,-7 -80,-10 -77,-13"  fill="#1a1520"/>
    <polygon points="-74,10 -77,13 -80,10 -77,7"     fill="#1a1520"/>
    <polygon points="-90,-4 -95,0 -90,4 -87,0"       fill="#1a1520"/>

    <!-- ── RAMURI DIAGONALE (NE, SE, SV, NV) — mai scurte, navy ────────── -->
    <g transform="rotate(45)">
      <polygon points="0,-46 3,-50 0,-54 -3,-50" fill="#1a1520"/>
      <polygon points="0,-60 3,-64 0,-68 -3,-64" fill="#1a1520"/>
      <polygon points="-9,-54 -6,-58 -9,-62 -12,-58" fill="#c41e3a"/>
      <polygon points="9,-54 12,-58 9,-62 6,-58"    fill="#c41e3a"/>
      <polygon points="0,-72 3,-76 0,-80 -3,-76"    fill="#c41e3a"/>
    </g>
    <g transform="rotate(135)">
      <polygon points="0,-46 3,-50 0,-54 -3,-50" fill="#1a1520"/>
      <polygon points="0,-60 3,-64 0,-68 -3,-64" fill="#1a1520"/>
      <polygon points="-9,-54 -6,-58 -9,-62 -12,-58" fill="#c41e3a"/>
      <polygon points="9,-54 12,-58 9,-62 6,-58"    fill="#c41e3a"/>
      <polygon points="0,-72 3,-76 0,-80 -3,-76"    fill="#c41e3a"/>
    </g>
    <g transform="rotate(225)">
      <polygon points="0,-46 3,-50 0,-54 -3,-50" fill="#1a1520"/>
      <polygon points="0,-60 3,-64 0,-68 -3,-64" fill="#1a1520"/>
      <polygon points="-9,-54 -6,-58 -9,-62 -12,-58" fill="#c41e3a"/>
      <polygon points="9,-54 12,-58 9,-62 6,-58"    fill="#c41e3a"/>
      <polygon points="0,-72 3,-76 0,-80 -3,-76"    fill="#c41e3a"/>
    </g>
    <g transform="rotate(315)">
      <polygon points="0,-46 3,-50 0,-54 -3,-50" fill="#1a1520"/>
      <polygon points="0,-60 3,-64 0,-68 -3,-64" fill="#1a1520"/>
      <polygon points="-9,-54 -6,-58 -9,-62 -12,-58" fill="#c41e3a"/>
      <polygon points="9,-54 12,-58 9,-62 6,-58"    fill="#c41e3a"/>
      <polygon points="0,-72 3,-76 0,-80 -3,-76"    fill="#c41e3a"/>
    </g>

    <!-- Sateliți (8 diamante navy în jurul stelei centrale) -->
    <polygon points="0,-42 4,-46 0,-50 -4,-46"      fill="#1a1520"/>
    <polygon points="29.7,-29.7 33.7,-25.7 29.7,-21.7 25.7,-25.7" fill="#1a1520"/>
    <polygon points="42,0 46,4 42,8 38,4"           fill="#1a1520"/>   <!-- wait, should be (42,-4 46,0 42,4 38,0) -->
    <polygon points="42,-4 46,0 42,4 38,0"          fill="#1a1520"/>
    <polygon points="29.7,21.7 33.7,25.7 29.7,29.7 25.7,25.7" fill="#1a1520"/>
    <polygon points="0,38 4,42 0,46 -4,42"          fill="#1a1520"/>
    <polygon points="-29.7,21.7 -25.7,25.7 -29.7,29.7 -33.7,25.7" fill="#1a1520"/>
    <polygon points="-42,-4 -38,0 -42,4 -46,0"     fill="#1a1520"/>
    <polygon points="-29.7,-29.7 -25.7,-25.7 -29.7,-21.7 -33.7,-25.7" fill="#1a1520"/>

  </g>

</svg>
